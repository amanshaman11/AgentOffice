services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      FRONTEND_ORIGINS: ${PUBLIC_URL:-http://localhost}
    volumes:
      - agentoffice-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${PUBLIC_URL:-http://localhost}
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_KEY: ${SUPABASE_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  agentoffice-data:
